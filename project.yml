name: Halo
options:
  bundleIdPrefix: com.sachi
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  Halo:
    type: application
    platform: iOS
    sources:
      - path: Halo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sachi.halo
        PRODUCT_NAME: Halo
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Halo Lifestyle
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: HaloWidgets
        embed: true
    entitlements:
      path: Halo/Halo.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.sachi.halo
    info:
      path: Halo/Info.plist
      properties:
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        CFBundleSpokenName: Halo
        NSHealthUpdateUsageDescription: "Halo logs the calories of meals you record so they appear in the Health app."
        NSHealthShareUsageDescription: "Halo reads your dietary energy and your workouts from Apple Health (including Apple Watch and Fitness) to keep your day in sync."
        NSSiriUsageDescription: "Use Siri to add to-dos, notes, and meals by voice."
        NSMicrophoneUsageDescription: "Halo listens while the app is open so you can speak commands like “Halo, add a to-do.”"
        NSSpeechRecognitionUsageDescription: "Halo turns your spoken commands into to-dos, notes, and meals on device."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

  HaloWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: HaloWidgets
      - path: Halo/Models
      - path: Halo/Support/AppSettings.swift
      - path: Halo/DesignSystem/Theme.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sachi.halo.widgets
        PRODUCT_NAME: HaloWidgets
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
    entitlements:
      path: HaloWidgets/HaloWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sachi.halo
    info:
      path: HaloWidgets/Info.plist
      properties:
        CFBundleDisplayName: Halo
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  HaloTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HaloTests
    dependencies:
      - target: Halo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sachi.halo.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Halo:
    build:
      targets:
        Halo: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HaloTests
